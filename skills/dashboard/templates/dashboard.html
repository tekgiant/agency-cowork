<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Knowledge Base</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
<style>
/* ── Theme ──────────────────────────────────────────────────────────────── */
:root {
  --bg: #faf8f4;
  --surface: #ffffff;
  --surface-raised: #fefdfb;
  --border: #e8e2d9;
  --border-light: #f0ece6;
  --text: #2d2a26;
  --text-dim: #7a7269;
  --text-muted: #b5aea5;
  --sage: #6b8f68;
  --sage-dim: #c2d5c0;
  --blue: #5b7fa5;
  --blue-dim: #bdd0e4;
  --amber: #b8892a;
  --amber-dim: #ecdcb0;
  --terracotta: #c5705d;
  --terracotta-dim: #e8c4ba;
  --font: 'DM Sans', system-ui, -apple-system, sans-serif;
  --mono: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
  --radius: 10px;
  --radius-sm: 5px;
  --shadow: 0 1px 3px rgba(45,42,38,.06), 0 1px 2px rgba(45,42,38,.04);
  --shadow-hover: 0 4px 16px rgba(45,42,38,.10);
  --transition: 180ms ease;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #191715;
    --surface: #232120;
    --surface-raised: #2c2a28;
    --border: #3d3935;
    --border-light: #2c2a28;
    --text: #e5dfd6;
    --text-dim: #a09889;
    --text-muted: #6b6560;
    --sage-dim: #2a3d29;
    --blue-dim: #263546;
    --amber-dim: #3d3420;
    --terracotta-dim: #4a302a;
    --shadow: 0 1px 3px rgba(0,0,0,.25);
    --shadow-hover: 0 4px 16px rgba(0,0,0,.35);
  }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0s !important; transition-duration: 0s !important; }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  padding: 0;
  overflow-x: hidden;
}

/* ── Layout ─────────────────────────────────────────────────────────────── */
.shell {
  display: grid;
  grid-template-columns: 300px 1fr;
  grid-template-rows: auto 1fr;
  height: 100vh;
  overflow: hidden;
}

.header {
  grid-column: 1 / -1;
  padding: 20px 28px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.header h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -.02em; }
.header .spacer { flex: 1; }
.header .meta { font-size: .78rem; color: var(--text-muted); font-family: var(--mono); }

.sidebar {
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 16px 0;
  background: var(--surface);
}

.content {
  overflow-y: auto;
  padding: 28px 36px 48px;
  background: var(--bg);
}

/* ── Stats Bar ──────────────────────────────────────────────────────────── */
.stats {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.stat-chip {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: .8rem;
  font-weight: 500;
  background: var(--border-light);
  color: var(--text-dim);
}
.stat-chip .num { font-family: var(--mono); font-weight: 600; color: var(--text); }

/* ── Search ─────────────────────────────────────────────────────────────── */
.search-box {
  padding: 8px 16px;
  margin-bottom: 4px;
}
.search-box input {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: .85rem;
  outline: none;
  transition: border var(--transition);
}
.search-box input:focus { border-color: var(--blue); }
.search-box input::placeholder { color: var(--text-muted); }

/* ── Sidebar Category ───────────────────────────────────────────────────── */
.cat-header {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 16px 6px;
  cursor: pointer;
  user-select: none;
  font-size: .75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text-muted);
}
.cat-header:hover { color: var(--text-dim); }
.cat-header .chevron {
  display: inline-block;
  width: 12px;
  text-align: center;
  transition: transform var(--transition);
  font-size: .7rem;
}
.cat-header .chevron.open { transform: rotate(90deg); }
.cat-header .count {
  margin-left: auto;
  font-family: var(--mono);
  font-size: .7rem;
  color: var(--text-muted);
  font-weight: 500;
}

.cat-files { overflow: hidden; }

/* ── File Item ──────────────────────────────────────────────────────────── */
.file-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 16px 6px 28px;
  cursor: pointer;
  font-size: .84rem;
  color: var(--text-dim);
  transition: background var(--transition), color var(--transition);
  border-left: 3px solid transparent;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.file-item:hover { background: var(--border-light); color: var(--text); }
.file-item.active {
  background: var(--blue-dim);
  color: var(--text);
  border-left-color: var(--blue);
  font-weight: 500;
}
.file-item .icon { font-size: .9rem; flex-shrink: 0; }
.file-item .label { overflow: hidden; text-overflow: ellipsis; }
.file-item .ext {
  margin-left: auto;
  font-size: .7rem;
  font-family: var(--mono);
  color: var(--text-muted);
  flex-shrink: 0;
}

/* ── Content Area ───────────────────────────────────────────────────────── */
.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 80px 20px;
  color: var(--text-dim);
}
.welcome .icon { font-size: 3rem; margin-bottom: 16px; opacity: .5; }
.welcome h2 { font-size: 1.2rem; font-weight: 500; margin-bottom: 8px; }
.welcome p { font-size: .9rem; color: var(--text-muted); max-width: 400px; }

.file-view { animation: fadeIn .2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

.file-header {
  display: flex; align-items: flex-start; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
}
.file-header h2 { font-size: 1.3rem; font-weight: 600; flex: 1; min-width: 200px; }
.file-meta {
  display: flex; gap: 16px; font-size: .78rem; color: var(--text-muted); font-family: var(--mono);
}

/* ── Action Buttons ─────────────────────────────────────────────────────── */
.actions { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text-dim);
  font-family: var(--font);
  font-size: .82rem;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
}
.btn:hover { background: var(--surface-raised); border-color: var(--blue); color: var(--text); box-shadow: var(--shadow); }
.btn.primary {
  background: var(--blue);
  border-color: var(--blue);
  color: #fff;
}
.btn.primary:hover { filter: brightness(1.1); }
.btn.danger { border-color: var(--red, #c5392f); color: var(--red, #c5392f); }
.btn.danger:hover { background: var(--red, #c5392f); color: #fff; border-color: var(--red, #c5392f); }

/* ── Ask AI Bar ─────────────────────────────────────────────────────────── */
.ask-bar {
  display: flex; gap: 8px; margin-bottom: 24px;
}
.ask-bar input {
  flex: 1;
  padding: 9px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  font-family: var(--font);
  font-size: .85rem;
  outline: none;
  transition: border var(--transition);
}
.ask-bar input:focus { border-color: var(--blue); }
.ask-bar input::placeholder { color: var(--text-muted); }

/* ── Markdown Rendering ─────────────────────────────────────────────────── */
.markdown-body {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px 32px;
  box-shadow: var(--shadow);
  font-size: .92rem;
  line-height: 1.7;
  overflow-x: auto;
}
.markdown-body h1 { font-size: 1.5rem; font-weight: 700; margin: 0 0 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.markdown-body h2 { font-size: 1.25rem; font-weight: 600; margin: 28px 0 12px; }
.markdown-body h3 { font-size: 1.05rem; font-weight: 600; margin: 24px 0 8px; color: var(--text-dim); }
.markdown-body h4, .markdown-body h5, .markdown-body h6 { font-size: .95rem; font-weight: 600; margin: 20px 0 8px; color: var(--text-dim); }
.markdown-body p { margin: 0 0 12px; }
.markdown-body ul, .markdown-body ol { margin: 0 0 12px; padding-left: 24px; }
.markdown-body li { margin-bottom: 4px; }
.markdown-body li > ul, .markdown-body li > ol { margin-top: 4px; margin-bottom: 4px; }
.markdown-body a { color: var(--blue); text-decoration: none; }
.markdown-body a:hover { text-decoration: underline; }
.markdown-body code {
  font-family: var(--mono);
  font-size: .85em;
  background: var(--border-light);
  padding: 2px 6px;
  border-radius: 3px;
}
.markdown-body pre {
  background: var(--surface-raised);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-sm);
  padding: 16px;
  overflow-x: auto;
  margin: 0 0 16px;
}
.markdown-body pre code { background: none; padding: 0; font-size: .82rem; }
.markdown-body blockquote {
  border-left: 3px solid var(--amber);
  padding: 8px 16px;
  margin: 0 0 12px;
  color: var(--text-dim);
  background: var(--amber-dim);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}
.markdown-body table { width: 100%; border-collapse: collapse; margin: 0 0 16px; font-size: .85rem; }
.markdown-body th, .markdown-body td {
  padding: 8px 12px;
  border: 1px solid var(--border);
  text-align: left;
}
.markdown-body th { background: var(--surface-raised); font-weight: 600; }
.markdown-body tr:hover td { background: var(--border-light); }
.markdown-body img { max-width: 100%; border-radius: var(--radius-sm); }
.markdown-body hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

/* Task list checkboxes */
.markdown-body input[type="checkbox"] { margin-right: 6px; }

/* ── Loading / Empty States ─────────────────────────────────────────────── */
.loading {
  display: flex; align-items: center; justify-content: center;
  padding: 80px 20px;
  color: var(--text-muted);
  font-size: .95rem;
}
.loading .spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin-right: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.empty-cat {
  padding: 12px 16px 12px 28px;
  font-size: .82rem;
  color: var(--text-muted);
  font-style: italic;
}

/* ── Scrollbar ──────────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>

<div class="shell">
  <!-- Header -->
  <div class="header">
    <h1>📚 Knowledge Base</h1>
    <div class="stats" id="stats"></div>
    <div class="spacer"></div>
    <div class="meta" id="timestamp"></div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="search-box">
      <input type="text" id="search" placeholder="Search files…" autocomplete="off">
    </div>
    <div id="file-tree"></div>
  </div>

  <!-- Content -->
  <div class="content" id="content">
    <div class="welcome">
      <div class="icon">📄</div>
      <h2>Select a file</h2>
      <p>Choose a file from the sidebar to view its contents and interact with it using AI.</p>
    </div>
  </div>
</div>

<script>
/* ── PostMessage Bridge ─────────────────────────────────────────────────── */
let DATA = null;
let activeFile = null;
let expandedCats = {};
let searchTerm = '';

/* ── Console Capture — sends errors/warns to parent for debug logging ──── */
function logToParent(level, ...args) {
  const message = args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ');
  parent.postMessage({ channel: "dashboard-action", type: "console-log", payload: { level, message } }, "*");
}
const _origError = console.error;
const _origWarn = console.warn;
console.error = (...args) => { _origError.apply(console, args); logToParent('error', ...args); };
console.warn = (...args) => { _origWarn.apply(console, args); logToParent('warn', ...args); };

// Catch unhandled errors and promise rejections
window.addEventListener('error', (e) => {
  logToParent('error', `Unhandled: ${e.message} at ${e.filename}:${e.lineno}:${e.colno}`);
});
window.addEventListener('unhandledrejection', (e) => {
  logToParent('error', `Unhandled rejection: ${e.reason}`);
});

window.addEventListener("message", (e) => {
  if (!e.data || e.data.channel !== "dashboard-data") return;
  if (e.data.type === "data-payload") {
    DATA = e.data.payload;
    try { render(); } catch (err) { showError(err); }
  }
  if (e.data.type === "data-changed") requestData();
  if (e.data.type === "file-content" && e.data.payload) {
    onFullFileReceived(e.data.requestPath, e.data.payload);
  }
});

function requestData() {
  parent.postMessage({ channel: "dashboard-action", type: "request-data" }, "*");
}

function getFile(filePath) {
  parent.postMessage({ channel: "dashboard-action", type: "get-file", payload: { path: filePath } }, "*");
}

function startTask(prompt, title) {
  parent.postMessage({ channel: "dashboard-action", type: "start-task", payload: { prompt, title } }, "*");
}

function openFile(absPath) {
  parent.postMessage({ channel: "dashboard-action", type: "open-file", payload: { path: absPath } }, "*");
}

/* ── Content CRUD — create, update, delete files in memory/ ─────────────── */

// Pending callbacks keyed by filePath
const _pendingSave = {};
const _pendingDelete = {};
const _pendingPatch = {};

/**
 * Save (create or overwrite) a file in the memory directory.
 * @param {string} filePath - Relative path within memory/ (e.g. "Projects/my-project.md")
 * @param {string} content  - Full file content (max 512KB)
 * @returns {Promise<{ok:boolean, path:string, modifiedAt:string} | {error:string}>}
 */
function saveFile(filePath, content) {
  return new Promise((resolve) => {
    _pendingSave[filePath] = resolve;
    parent.postMessage({ channel: "dashboard-action", type: "save-file", payload: { path: filePath, content } }, "*");
    setTimeout(() => { if (_pendingSave[filePath]) { delete _pendingSave[filePath]; resolve({ error: "Timeout" }); } }, 10000);
  });
}

/**
 * Delete a file from the memory directory.
 * @param {string} filePath - Relative path within memory/
 * @returns {Promise<{ok:boolean, path:string} | {error:string}>}
 */
function deleteFile(filePath) {
  return new Promise((resolve) => {
    _pendingDelete[filePath] = resolve;
    parent.postMessage({ channel: "dashboard-action", type: "delete-file", payload: { path: filePath } }, "*");
    setTimeout(() => { if (_pendingDelete[filePath]) { delete _pendingDelete[filePath]; resolve({ error: "Timeout" }); } }, 10000);
  });
}

/**
 * Update specific YAML frontmatter fields without rewriting the entire file.
 * @param {string} filePath - Relative path within memory/
 * @param {Object} fields   - Key/value pairs to set (e.g. { status: "complete", priority: 1 })
 * @returns {Promise<{ok:boolean, path:string, modifiedAt:string} | {error:string}>}
 */
function patchFrontmatter(filePath, fields) {
  return new Promise((resolve) => {
    _pendingPatch[filePath] = resolve;
    parent.postMessage({ channel: "dashboard-action", type: "patch-frontmatter", payload: { path: filePath, fields } }, "*");
    setTimeout(() => { if (_pendingPatch[filePath]) { delete _pendingPatch[filePath]; resolve({ error: "Timeout" }); } }, 10000);
  });
}

// Listen for CRUD results from the host
window.addEventListener("message", (e) => {
  if (!e.data || e.data.channel !== "dashboard-data") return;
  const { type, payload, requestPath } = e.data;
  if (type === "save-result" && _pendingSave[requestPath]) {
    _pendingSave[requestPath](payload); delete _pendingSave[requestPath];
  } else if (type === "delete-result" && _pendingDelete[requestPath]) {
    _pendingDelete[requestPath](payload); delete _pendingDelete[requestPath];
  } else if (type === "patch-result" && _pendingPatch[requestPath]) {
    _pendingPatch[requestPath](payload); delete _pendingPatch[requestPath];
  }
});

/* ── Error Boundary — show render errors visibly ─────────────────────────── */
function showError(err) {
  console.error('Dashboard render error:', err);
  const el = document.getElementById('content');
  if (el) {
    el.innerHTML = `<div style="padding:24px;margin:20px;border:2px solid #c5392f;border-radius:8px;background:#3f201e;color:#f5c6c2;font-family:monospace;font-size:.85rem;">
      <div style="font-weight:700;font-size:1rem;margin-bottom:8px;">⚠️ Dashboard Render Error</div>
      <pre style="white-space:pre-wrap;word-break:break-word;margin:0;">${escapeHtml(err.stack || err.message || String(err))}</pre>
    </div>`;
  }
}

if (window.parent !== window) requestData();

/* ── Helpers ─────────────────────────────────────────────────────────────── */
function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function relativeTime(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  if (days < 30) return `${days}d ago`;
  return new Date(iso).toLocaleDateString();
}

function formatSize(kb) {
  if (kb < 1) return '<1 KB';
  if (kb < 1024) return `${Math.round(kb)} KB`;
  return `${(kb / 1024).toFixed(1)} MB`;
}

function fileIcon(ext) {
  const icons = {
    '.md': '📝', '.json': '📊', '.csv': '📈', '.yaml': '⚙️', '.yml': '⚙️',
    '.toml': '⚙️', '.xml': '📋', '.txt': '📄', '.html': '🌐',
  };
  return icons[ext] || '📄';
}

function getCategoryIcon(name) {
  const n = name.toLowerCase();
  if (n === 'knowledgebase') return '📚';
  if (n === 'dailylogs') return '📅';
  if (n === 'weeklyreports') return '📊';
  if (n === 'program') return '🎯';
  if (n === '_root') return '📁';
  return '📂';
}

function getCategoryLabel(name) {
  if (name === '_root') return 'Root Files';
  return name.replace(/([A-Z])/g, ' $1').trim();
}

// Full path for AI prompts: memory/Category/subdir/file.md
function memoryPath(f) {
  if (!f) return '';
  const cat = f.category === '_root' ? '' : f.category + '/';
  return 'memory/' + cat + f.path;
}

/* ── Build folder tree from flat file list ───────────────────────────────── */
function buildFolderTree(files) {
  const root = { _files: [], _dirs: {} };
  for (const f of files) {
    const parts = f.path.replace(/\\/g, '/').split('/');
    let node = root;
    for (let i = 0; i < parts.length - 1; i++) {
      if (!node._dirs[parts[i]]) node._dirs[parts[i]] = { _files: [], _dirs: {} };
      node = node._dirs[parts[i]];
    }
    node._files.push(f);
  }
  return root;
}

/* ── Collect all files across categories ─────────────────────────────────── */
function getAllFiles() {
  if (!DATA || !DATA.memory) return [];
  const files = [];
  for (const [cat, info] of Object.entries(DATA.memory)) {
    if (!info.files) continue;
    for (const f of info.files) {
      files.push({ ...f, category: cat });
    }
  }
  return files;
}

function getFilteredCategories() {
  if (!DATA || !DATA.memory) return {};
  const term = searchTerm.toLowerCase();
  const result = {};
  for (const [cat, info] of Object.entries(DATA.memory)) {
    if (!info.files || info.files.length === 0) continue;
    const filtered = term
      ? info.files.filter(f => f.name.toLowerCase().includes(term) || f.filename.toLowerCase().includes(term) || (f.content && f.content.toLowerCase().includes(term)))
      : info.files;
    if (filtered.length > 0) {
      result[cat] = { ...info, files: filtered };
    }
  }
  return result;
}

/* ── Render ──────────────────────────────────────────────────────────────── */
function render() {
  if (!DATA) return;
  renderStats();
  renderTimestamp();
  renderTree();
  renderContent();
}

function renderStats() {
  const allFiles = getAllFiles();
  const mdCount = allFiles.filter(f => f.ext === '.md').length;
  const jsonCount = allFiles.filter(f => f.ext === '.json').length;
  const otherCount = allFiles.length - mdCount - jsonCount;
  const cats = Object.keys(DATA.memory || {}).filter(k => k !== '_root' && DATA.memory[k].files?.length > 0);

  let html = `<span class="stat-chip"><span class="num">${allFiles.length}</span> files</span>`;
  html += `<span class="stat-chip"><span class="num">${cats.length}</span> categories</span>`;
  if (mdCount > 0) html += `<span class="stat-chip"><span class="num">${mdCount}</span> markdown</span>`;
  if (jsonCount > 0) html += `<span class="stat-chip"><span class="num">${jsonCount}</span> JSON</span>`;
  if (otherCount > 0) html += `<span class="stat-chip"><span class="num">${otherCount}</span> other</span>`;
  document.getElementById('stats').innerHTML = html;
}

function renderTimestamp() {
  const ts = DATA.generatedAt ? new Date(DATA.generatedAt).toLocaleString() : '';
  document.getElementById('timestamp').textContent = ts ? `Updated ${ts}` : '';
}

function renderTree() {
  const cats = getFilteredCategories();
  const sortedKeys = Object.keys(cats).sort((a, b) => {
    if (a === '_root') return 1;
    if (b === '_root') return -1;
    return a.localeCompare(b);
  });

  let html = '';
  for (const cat of sortedKeys) {
    const info = cats[cat];
    const isOpen = expandedCats[cat] !== false; // default open
    const tree = buildFolderTree(info.files);

    html += `<div class="cat-header" onclick="toggleCat('${cat}')">
      <span class="chevron ${isOpen ? 'open' : ''}">▶</span>
      ${getCategoryIcon(cat)} ${escapeHtml(getCategoryLabel(cat))}
      <span class="count">${info.files.length}</span>
    </div>`;

    html += `<div class="cat-files" style="display:${isOpen ? 'block' : 'none'}">`;
    html += renderFolderNode(tree, cat, 0);
    html += `</div>`;
  }

  if (sortedKeys.length === 0) {
    html = `<div class="empty-cat">No files found${searchTerm ? ' matching "' + escapeHtml(searchTerm) + '"' : ''}</div>`;
  }

  document.getElementById('file-tree').innerHTML = html;
}

function renderFolderNode(node, cat, depth) {
  let html = '';
  const indent = 28 + depth * 16;

  // Render subdirectories first, sorted
  const dirNames = Object.keys(node._dirs).sort();
  for (const dirName of dirNames) {
    const dirKey = cat + '/' + dirName + '/' + depth;
    const isOpen = expandedCats[dirKey] !== false;
    const dirNode = node._dirs[dirName];
    const fileCount = countFiles(dirNode);

    html += `<div class="file-item" style="padding-left:${indent}px;color:var(--text-dim);font-weight:500;" onclick="toggleCat('${escapeHtml(dirKey)}')">
      <span class="icon" style="font-size:.75rem;">${isOpen ? '▼' : '▶'}</span>
      <span class="label">📂 ${escapeHtml(dirName)}</span>
      <span class="ext" style="font-size:.65rem;">${fileCount}</span>
    </div>`;

    if (isOpen) {
      html += renderFolderNode(dirNode, cat, depth + 1);
    }
  }

  // Render files, sorted
  const sortedFiles = [...node._files].sort((a, b) => a.name.localeCompare(b.name));
  for (const f of sortedFiles) {
    const fileKey = (f.category || cat) + '::' + f.path;
    const isActive = activeFile && (activeFile.category + '::' + activeFile.path) === fileKey;
    html += `<div class="file-item ${isActive ? 'active' : ''}" style="padding-left:${indent}px;" onclick="selectFile('${escapeHtml(cat)}','${escapeHtml(f.path)}')" title="${escapeHtml(memoryPath(f))}">
      <span class="icon">${fileIcon(f.ext)}</span>
      <span class="label">${escapeHtml(f.name)}</span>
      <span class="ext">${f.ext}</span>
    </div>`;
  }

  return html;
}

function countFiles(node) {
  let count = node._files.length;
  for (const d of Object.values(node._dirs)) count += countFiles(d);
  return count;
}

function renderContent() {
  const el = document.getElementById('content');
  if (!activeFile) {
    el.innerHTML = `<div class="welcome">
      <div class="icon">📄</div>
      <h2>Select a file</h2>
      <p>Choose a file from the sidebar to view its contents and interact with it using AI.</p>
    </div>`;
    return;
  }

  const f = activeFile;
  const mp = memoryPath(f);
  const rendered = renderFileContent(f);

  el.innerHTML = `<div class="file-view">
    <div class="file-header">
      <h2>${escapeHtml(f.name)}</h2>
      <div class="file-meta">
        <span>${formatSize(f.sizeKB)}</span>
        <span>${relativeTime(f.modifiedAt)}</span>
        <span>${escapeHtml(mp)}</span>
      </div>
    </div>

    <div class="actions">
      <button class="btn" onclick="openFile('${escapeHtml(f.absPath)}')">📂 Open File</button>
      <button class="btn" onclick="startTask('Summarize the file at ${escapeHtml(mp)} and list the key points', 'Summarize: ${escapeHtml(f.filename)}')">✨ Summarize</button>
      <button class="btn" onclick="startTask('Update the knowledge base article at ${escapeHtml(mp)} with the latest information', 'Update: ${escapeHtml(f.filename)}')">📝 Update</button>
      ${f.ext === '.md' ? `<button class="btn" onclick="startTask('Review the article at ${escapeHtml(mp)} for completeness and accuracy. Suggest improvements.', 'Review: ${escapeHtml(f.filename)}')">🔍 Review</button>` : ''}
      ${f.ext === '.md' ? `<button class="btn" onclick="toggleFrontmatterEditor()">🏷️ Edit Tags</button>` : ''}
      ${f.ext === '.md' ? `<button class="btn" onclick="toggleContentEditor()">✏️ Edit</button>` : ''}
      <button class="btn danger" onclick="confirmDeleteFile('${escapeHtml(mp)}', '${escapeHtml(f.name)}')">🗑️ Delete</button>
    </div>

    <div id="frontmatter-editor" style="display:none;margin-bottom:16px;">
      <div style="background:var(--bg-3);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px;">
        <div style="font-weight:600;margin-bottom:10px;color:var(--text-dim);font-size:.82rem;text-transform:uppercase;letter-spacing:.5px;">Edit Frontmatter Fields</div>
        <div id="fm-fields" style="display:flex;flex-direction:column;gap:8px;"></div>
        <div style="margin-top:10px;display:flex;gap:8px;align-items:center;">
          <input type="text" id="fm-new-key" placeholder="New field name" style="flex:1;padding:6px 10px;background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:.85rem;">
          <input type="text" id="fm-new-val" placeholder="Value" style="flex:1;padding:6px 10px;background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:.85rem;">
          <button class="btn" onclick="addFrontmatterField()">+ Add</button>
        </div>
        <div style="margin-top:12px;display:flex;gap:8px;">
          <button class="btn primary" onclick="saveFrontmatter()">💾 Save Fields</button>
          <button class="btn" onclick="toggleFrontmatterEditor()">Cancel</button>
        </div>
        <div id="fm-status" style="margin-top:8px;font-size:.8rem;"></div>
      </div>
    </div>

    <div id="content-editor" style="display:none;margin-bottom:16px;">
      <div style="background:var(--bg-3);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px;">
        <div style="font-weight:600;margin-bottom:10px;color:var(--text-dim);font-size:.82rem;text-transform:uppercase;letter-spacing:.5px;">Edit Content</div>
        <textarea id="edit-textarea" style="width:100%;min-height:300px;padding:10px;background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--mono);font-size:.85rem;resize:vertical;line-height:1.5;"></textarea>
        <div style="margin-top:12px;display:flex;gap:8px;">
          <button class="btn primary" onclick="saveContentEdit()">💾 Save</button>
          <button class="btn" onclick="toggleContentEditor()">Cancel</button>
        </div>
        <div id="edit-status" style="margin-top:8px;font-size:.8rem;"></div>
      </div>
    </div>

    <div class="ask-bar">
      <input type="text" id="ask-input" placeholder="Ask AI about this file…" onkeydown="handleAsk(event)">
      <button class="btn primary" onclick="submitAsk()">Ask AI</button>
    </div>

    ${f.truncated ? `<div style="padding:8px 14px;margin-bottom:16px;border-radius:var(--radius-sm);background:var(--amber-dim);color:var(--amber);font-size:.82rem;display:flex;align-items:center;gap:8px;">
      <span>⏳</span> Loading full file content…
    </div>` : ''}

    ${rendered}
  </div>`;

  // Focus won't steal from sidebar search
}

function renderFileContent(f) {
  if (!f.content) {
    return `<div class="markdown-body"><p style="color:var(--text-muted);font-style:italic;">No content available</p></div>`;
  }

  if (f.ext === '.md') {
    try {
      const html = marked.parse(f.content);
      return `<div class="markdown-body">${html}</div>`;
    } catch {
      return `<div class="markdown-body"><pre><code>${escapeHtml(f.content)}</code></pre></div>`;
    }
  }

  if (f.ext === '.json') {
    try {
      const obj = JSON.parse(f.content);
      const pretty = JSON.stringify(obj, null, 2);
      return `<div class="markdown-body"><pre><code>${escapeHtml(pretty)}</code></pre></div>`;
    } catch {
      return `<div class="markdown-body"><pre><code>${escapeHtml(f.content)}</code></pre></div>`;
    }
  }

  // All other text files
  return `<div class="markdown-body"><pre><code>${escapeHtml(f.content)}</code></pre></div>`;
}

/* ── Interactions ────────────────────────────────────────────────────────── */
function toggleCat(cat) {
  expandedCats[cat] = expandedCats[cat] === false ? true : false;
  renderTree();
}

function selectFile(cat, filePath) {
  if (!DATA || !DATA.memory[cat]) return;
  const file = DATA.memory[cat].files.find(f => f.path === filePath);
  if (file) {
    activeFile = { ...file, category: cat, fullContentLoaded: false };
    renderTree();
    renderContent();
    if (file.truncated) {
      // getFile expects path relative to memory/, so strip the "memory/" prefix
      const relPath = cat === '_root' ? file.path : cat + '/' + file.path;
      getFile(relPath);
    }
  }
}

function onFullFileReceived(requestPath, result) {
  if (result.error) {
    console.warn("Full file fetch failed:", result.error);
    return;
  }
  if (!activeFile) return;
  // Match: requestPath is "Category/subdir/file.md", result.path is also relative to memory/
  const activeRelPath = activeFile.category === '_root' ? activeFile.path : activeFile.category + '/' + activeFile.path;
  if (activeRelPath === requestPath || result.path === requestPath) {
    activeFile.content = result.content;
    activeFile.sizeKB = result.sizeKB;
    activeFile.truncated = false;
    activeFile.fullContentLoaded = true;
    renderContent();
  }
}

function handleAsk(e) {
  if (e.key === 'Enter') submitAsk();
}

function submitAsk() {
  const input = document.getElementById('ask-input');
  if (!input || !input.value.trim()) return;
  const question = input.value.trim();
  const fileRef = activeFile ? ` (referring to the file at ${memoryPath(activeFile)})` : '';
  const title = activeFile ? `Q: ${question.slice(0, 60)} — ${activeFile.filename}` : question.slice(0, 80);
  startTask(question + fileRef, title);
  input.value = '';
}

/* ── Search ──────────────────────────────────────────────────────────────── */
document.getElementById('search').addEventListener('input', (e) => {
  searchTerm = e.target.value.trim();
  renderTree();
});

/* ── Content CRUD UI Handlers ───────────────────────────────────────────── */

function toggleFrontmatterEditor() {
  const el = document.getElementById('frontmatter-editor');
  if (!el) return;
  const show = el.style.display === 'none';
  el.style.display = show ? 'block' : 'none';
  // Close content editor when opening frontmatter
  const ce = document.getElementById('content-editor');
  if (ce && show) ce.style.display = 'none';

  if (show && activeFile) {
    // Parse existing frontmatter into editable fields
    const fields = parseFrontmatter(activeFile.content || '');
    renderFmFields(fields);
  }
}

function parseFrontmatter(content) {
  const m = content.match(/^---\r?\n([\s\S]*?)\r?\n---/);
  if (!m) return {};
  const fields = {};
  for (const line of m[1].split('\n')) {
    const idx = line.indexOf(':');
    if (idx > 0) {
      const key = line.slice(0, idx).trim();
      const val = line.slice(idx + 1).trim();
      if (key) fields[key] = val;
    }
  }
  return fields;
}

function renderFmFields(fields) {
  const container = document.getElementById('fm-fields');
  if (!container) return;
  let html = '';
  for (const [key, val] of Object.entries(fields)) {
    html += `<div style="display:flex;gap:8px;align-items:center;">
      <span style="min-width:120px;font-size:.85rem;color:var(--text-dim);font-family:var(--mono);">${escapeHtml(key)}</span>
      <input type="text" class="fm-val" data-key="${escapeHtml(key)}" value="${escapeHtml(val)}" style="flex:1;padding:6px 10px;background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:.85rem;">
    </div>`;
  }
  if (Object.keys(fields).length === 0) {
    html = `<div style="color:var(--text-muted);font-style:italic;font-size:.85rem;">No frontmatter fields found. Add fields below.</div>`;
  }
  container.innerHTML = html;
}

function addFrontmatterField() {
  const keyEl = document.getElementById('fm-new-key');
  const valEl = document.getElementById('fm-new-val');
  if (!keyEl || !valEl || !keyEl.value.trim()) return;
  const container = document.getElementById('fm-fields');
  // Remove "no fields" message
  const empty = container.querySelector('div[style*="font-style:italic"]');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.style = 'display:flex;gap:8px;align-items:center;';
  div.innerHTML = `
    <span style="min-width:120px;font-size:.85rem;color:var(--text-dim);font-family:var(--mono);">${escapeHtml(keyEl.value.trim())}</span>
    <input type="text" class="fm-val" data-key="${escapeHtml(keyEl.value.trim())}" value="${escapeHtml(valEl.value)}" style="flex:1;padding:6px 10px;background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:.85rem;">
  `;
  container.appendChild(div);
  keyEl.value = '';
  valEl.value = '';
  keyEl.focus();
}

async function saveFrontmatter() {
  if (!activeFile) return;
  const statusEl = document.getElementById('fm-status');
  const inputs = document.querySelectorAll('#fm-fields .fm-val');
  const fields = {};
  for (const inp of inputs) {
    const key = inp.dataset.key;
    if (key) fields[key] = inp.value;
  }
  if (Object.keys(fields).length === 0) {
    if (statusEl) statusEl.innerHTML = '<span style="color:var(--amber);">No fields to save</span>';
    return;
  }
  if (statusEl) statusEl.innerHTML = '<span style="color:var(--text-muted);">Saving…</span>';
  const result = await patchFrontmatter(memoryPath(activeFile), fields);
  if (result.ok) {
    if (statusEl) statusEl.innerHTML = '<span style="color:var(--green, #6abf69);">✓ Saved</span>';
    // Data will auto-refresh via file watcher
  } else {
    if (statusEl) statusEl.innerHTML = `<span style="color:var(--red, #c5392f);">✗ ${escapeHtml(result.error || 'Failed')}</span>`;
  }
}

function toggleContentEditor() {
  const el = document.getElementById('content-editor');
  if (!el) return;
  const show = el.style.display === 'none';
  el.style.display = show ? 'block' : 'none';
  // Close frontmatter editor when opening content editor
  const fm = document.getElementById('frontmatter-editor');
  if (fm && show) fm.style.display = 'none';

  if (show && activeFile) {
    const textarea = document.getElementById('edit-textarea');
    if (textarea) textarea.value = activeFile.content || '';
  }
}

async function saveContentEdit() {
  if (!activeFile) return;
  const statusEl = document.getElementById('edit-status');
  const textarea = document.getElementById('edit-textarea');
  if (!textarea) return;
  if (statusEl) statusEl.innerHTML = '<span style="color:var(--text-muted);">Saving…</span>';
  const result = await saveFile(memoryPath(activeFile), textarea.value);
  if (result.ok) {
    if (statusEl) statusEl.innerHTML = '<span style="color:var(--green, #6abf69);">✓ Saved</span>';
    // Data will auto-refresh via file watcher
  } else {
    if (statusEl) statusEl.innerHTML = `<span style="color:var(--red, #c5392f);">✗ ${escapeHtml(result.error || 'Failed')}</span>`;
  }
}

async function confirmDeleteFile(mp, name) {
  if (!confirm(`Delete "${name}"?\n\nPath: ${mp}\n\nThis cannot be undone.`)) return;
  const result = await deleteFile(mp);
  if (result.ok) {
    activeFile = null;
    renderContent();
    // Tree will auto-refresh via file watcher
  } else {
    alert('Delete failed: ' + (result.error || 'Unknown error'));
  }
}
</script>

</body>
