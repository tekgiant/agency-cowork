<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <g id="Main_Group">
  <g id="layer-background">
    <rect x="0" y="0" width="1920" height="1080" fill="#f8fafc"/>
    <text x="36" y="44" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Example API Profile Investigation Flow</text>
    <text x="36" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#374151">
      <tspan x="36" y="72">PPT-friendly SVG: grouped layers, basic shapes,</tspan>
      <tspan x="36" y="90">no marker defs/CSS dependencies, token redacted.</tspan>
    </text>
  </g>

  <g id="layer-lanes">
    <rect x="24" y="96" width="442" height="954" fill="#eef2ff" stroke="#c7d2fe" stroke-width="2"/>
    <rect x="484" y="96" width="442" height="954" fill="#ecfeff" stroke="#a5f3fc" stroke-width="2"/>
    <rect x="944" y="96" width="442" height="954" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="2"/>
    <rect x="1404" y="96" width="492" height="954" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>

    <text x="44" y="128" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#1f2937">1) Setup and Auth</text>
    <text x="504" y="128" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#1f2937">2) Profile Query Iterations</text>
    <text x="964" y="128" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#1f2937">3) Placement and Meta Checks</text>
    <text x="1424" y="128" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#1f2937">4) Filters and Outcome</text>
  </g>

  <g id="layer-setup-auth">
    <rect x="44" y="156" width="402" height="166" fill="#ffffff" stroke="#818cf8" stroke-width="2"/>
    <text x="60" y="176" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">
      <tspan x="60" y="176">Tool: read_file</tspan>
      <tspan x="60" y="198" font-size="12" fill="#1f2937">Object: .vscode/mcp.json</tspan>
      <tspan x="60" y="218" font-size="12" fill="#1f2937">Detected API connector configuration</tspan>
      <tspan x="60" y="238" font-size="11" fill="#4b5563">Auth source: Bearer [AUTH_TOKEN]</tspan>
    </text>

    <!-- moved second box down to avoid overlap with first box -->
    <rect x="44" y="336" width="402" height="120" fill="#ffffff" stroke="#818cf8" stroke-width="2"/>
    <text x="60" y="356" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">
      <tspan x="60" y="356">Tool: ask_questions</tspan>
      <tspan x="60" y="376" font-size="12" fill="#1f2937">Captured bearer token securely</tspan>
      <tspan x="60" y="394" font-size="11" fill="#065f46">Stored/displayed as [AUTH_TOKEN] placeholder</tspan>
    </text>

    <!-- moved third box down to sit below second box -->
    <rect x="44" y="476" width="402" height="140" fill="#ffffff" stroke="#818cf8" stroke-width="2"/>
    <text x="60" y="496" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">
      <tspan x="60" y="496">User Constraint</tspan>
      <tspan x="60" y="516" font-size="12" fill="#1f2937">Apply placement + frequency/recency filters</tspan>
      <tspan x="60" y="534" font-size="12" fill="#1f2937">as early as possible in query path.</tspan>
      <tspan x="60" y="552" font-size="11" fill="#4b5563">entity_id=[ENTITY_ID], target_id=[TARGET_ID]</tspan>
    </text>
  </g>

  <g id="layer-profile-queries">
    <rect x="504" y="156" width="402" height="144" fill="#ffffff" stroke="#22d3ee" stroke-width="2"/>
    <text x="520" y="182" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Tool: search_profiles</text>
    <text x="520" y="206" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#1f2937">Object: profiles</text>
    <text x="520" y="228" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#1f2937">Filters attempted in-call:</text>
    <text x="520" y="250" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#374151">search="[TARGET_ID]"</text>
    <text x="520" y="270" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#374151">min_session_frequency=0 / min_lifetime_frequency=0</text>

    <rect x="504" y="320" width="402" height="126" fill="#ffffff" stroke="#22d3ee" stroke-width="2"/>
    <text x="520" y="346" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Returned Payload Snapshot</text>
    <text x="520" y="370" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#1f2937">total_count=377,681</text>
    <text x="520" y="392" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#1f2937">retrieved=1,000</text>
    <text x="520" y="414" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#991b1b">Observed: wrapper-level filters did not narrow count</text>

    <rect x="504" y="466" width="402" height="146" fill="#ffffff" stroke="#22d3ee" stroke-width="2"/>
    <text x="520" y="492" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Further Attempts</text>
    <text x="520" y="516" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#1f2937">count_only with min_* = 1</text>
    <text x="520" y="538" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#1f2937">placement_id / placement_targets params</text>
    <text x="520" y="560" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#991b1b">Some rejected as invalid extra properties</text>
    <text x="520" y="582" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#991b1b">No count reduction from profile endpoint wrapper</text>
  </g>

  <g id="layer-placement-meta">
    <rect x="964" y="156" width="402" height="132" fill="#ffffff" stroke="#4ade80" stroke-width="2"/>
    <text x="980" y="182" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Tool: search_targets</text>
    <text x="980" y="206" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#1f2937">Target-first pivot (id=[TARGET_ID])</text>
    <text x="980" y="228" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#1f2937">Result in first call: 0 placements</text>
    <text x="980" y="250" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#991b1b">Member-scoped follow-ups were skipped in session</text>

    <rect x="964" y="308" width="402" height="132" fill="#ffffff" stroke="#4ade80" stroke-width="2"/>
    <text x="980" y="334" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Tool: get_profile_meta</text>
    <text x="980" y="358" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#1f2937">Without member_id: API said member_id required</text>
    <text x="980" y="380" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#1f2937">With member_id: wrapper rejected additional props</text>
    <text x="980" y="402" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#991b1b">Meta route unavailable through current schema</text>

    <rect x="964" y="460" width="402" height="152" fill="#ffffff" stroke="#4ade80" stroke-width="2"/>
    <text x="980" y="486" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Local Validation Path</text>
    <text x="980" y="510" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#1f2937">Tools: create_file + run_in_terminal</text>
    <text x="980" y="532" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#1f2937">Script: _tmp_profile_filter.py</text>
    <text x="980" y="554" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#374151">Validated fields: placement_targets + cap fields</text>
    <text x="980" y="576" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#374151">line_item_id/line_item not present in matched page</text>
    <text x="980" y="598" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#92400e">Result only definitive for retrieved page slice</text>
  </g>

  <g id="layer-filters-outcome">
    <rect x="1424" y="156" width="452" height="214" fill="#ffffff" stroke="#fb923c" stroke-width="2"/>
    <text x="1440" y="182" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Post-filter Logic Applied</text>
    <text x="1440" y="206" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#1f2937">Filter A: target list contains id=[TARGET_ID]</text>
    <text x="1440" y="228" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#1f2937">Filter B: at least one non-null cap value</text>
    <text x="1440" y="250" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#374151">min_session_imps, max_session_imps, max_day_imps</text>
    <text x="1440" y="270" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#374151">max_lifetime_imps, max_page_imps, max_hour/week/month</text>
    <text x="1440" y="290" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#374151">min_minutes_per_imp</text>
    <text x="1440" y="314" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#065f46">Intended output: profiles + associated line items [id, name]</text>
    <text x="1440" y="338" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#92400e">Token always redacted: [AUTH_TOKEN]</text>

    <rect x="1424" y="390" width="452" height="190" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
    <text x="1440" y="416" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Observed Outcome in Session</text>
    <text x="1440" y="440" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#1f2937">retrieved_profiles = 1,000</text>
    <text x="1440" y="462" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#1f2937">matched_profiles (A+B) = 0</text>
    <text x="1440" y="484" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#1f2937">matched_with_line_item_id = 0</text>
    <text x="1440" y="506" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#1f2937">matched_with_line_item_obj = 0</text>
    <text x="1440" y="530" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#991b1b">
      <tspan x="1440" y="530">Not full-universe definitive due unavailable/</tspan>
      <tspan x="1440" y="548">skipped narrowing paths</tspan>
    </text>
    <text x="1440" y="568" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#374151">Use as workflow map for PPT edits.</text>

    <rect x="1424" y="602" width="452" height="256" fill="#ffffff" stroke="#fb923c" stroke-width="2"/>
    <text x="1440" y="612" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">
      <tspan x="1440" y="628">PPT Conversion Notes</tspan>
      <tspan x="1440" y="648" font-size="11" fill="#1f2937">- Uses only rect/line/polygon/text primitives.</tspan>
      <tspan x="1440" y="666" font-size="11" fill="#1f2937">- Layers grouped with ids (easy ungroup/edit).</tspan>
      <tspan x="1440" y="684" font-size="11" fill="#1f2937">- No CSS class dependency or marker defs.</tspan>
      <tspan x="1440" y="702" font-size="11" fill="#1f2937">- Flat colors + simple borders for stable import.</tspan>
      <tspan x="1440" y="720" font-size="11" fill="#1f2937">- Fonts fallback to Arial if Segoe unavailable.</tspan>
      <tspan x="1440" y="738" font-size="11" fill="#374151">Tip: In PPT use Insert &gt; Pictures &gt; This Device,</tspan>
      <tspan x="1440" y="756" font-size="11" fill="#374151">then right-click &gt; Convert to Shape.</tspan>
    </text>
  </g>

  <g id="layer-connectors" stroke="#6b7280" stroke-width="2" fill="#6b7280">
    <!-- updated vertical connectors for Setup/Auth column to match moved boxes -->
    <line x1="245" y1="316" x2="245" y2="336"/>
    <polygon points="240,336 250,336 245,344"/>
    <line x1="245" y1="456" x2="245" y2="476"/>
    <polygon points="240,476 250,476 245,484"/>

    <line x1="446" y1="484" x2="504" y2="228"/>
    <polygon points="498,231 508,227 502,237"/>

    <line x1="705" y1="300" x2="705" y2="320"/>
    <polygon points="700,320 710,320 705,328"/>
    <line x1="705" y1="446" x2="705" y2="466"/>
    <polygon points="700,466 710,466 705,474"/>

    <line x1="926" y1="228" x2="964" y2="228"/>
    <polygon points="964,223 964,233 972,228"/>
    <line x1="926" y1="540" x2="964" y2="540"/>
    <polygon points="964,535 964,545 972,540"/>

    <line x1="1386" y1="228" x2="1424" y2="228"/>
    <polygon points="1424,223 1424,233 1432,228"/>
    <line x1="1386" y1="540" x2="1424" y2="540"/>
    <polygon points="1424,535 1424,545 1432,540"/>

    <line x1="1650" y1="370" x2="1650" y2="390"/>
    <polygon points="1645,390 1655,390 1650,398"/>
    <line x1="1650" y1="580" x2="1650" y2="602"/>
    <polygon points="1645,602 1655,602 1650,610"/>
  </g>

  <g id="layer-legend">
    <rect x="24" y="1010" width="1872" height="62" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
    <text x="40" y="1032" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#111827">Legend:</text>
    <text x="96" y="1032" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#374151">
      <tspan x="96" y="1032">Lanes = phases; boxes = tools/objects/filters; arrows = sequence.</tspan>
      <tspan x="96" y="1050">Red text = blockers; amber text = caution; green text = confirmed state.</tspan>
    </text>
    <text x="40" y="1064" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#374151">Security note: all credentials intentionally replaced with placeholders for sharing.</text>
  </g>
  </g>
</svg>
